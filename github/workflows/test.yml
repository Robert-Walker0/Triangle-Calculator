name: Test Project

on: 
  push: 
    branches:  [ main ] 
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install and Build Lua
        uses: leafo/gh-actions-lua@v12
        with: 
          luaVersion: "5.1.5"

      - name: Install Luarocks
        uses: leafo/gh-actions-luarocks@v12

      - name: Install Lua Unit Test
        run: luarocks install luaunit

      - name: Run Unit Tests
        run: |
          lua tests/input_function_test.lua && lua tests/calculations_test.lua
